on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy_docker_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.GHA_AWS_ASSUME_ROLE }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3

      - name: Build image
        run: |
          docker build -t ${{ inputs.service }} ./${{ inputs.service }}

      - name: Tag image
        run: |
          docker tag ${{ inputs.service }}:latest \
          ${{ steps.login-ecr.outputs.registry }}/locked-out-${{ inputs.service }}:latest

      - name: Push image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/locked-out-${{ inputs.service }}:latest
