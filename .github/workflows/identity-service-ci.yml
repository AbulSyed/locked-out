name: identity-service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'identity-service/**'
  pull_request:
#    branches: [ "main" ]
    paths:
      - 'identity-service/**'

permissions:
  id-token: write
  contents: read

jobs:
  context:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.context.outputs.commit_sha }}
      pr_label: ${{ steps.context.outputs.pr_label }}

    steps:
      - name: Set PR label and commit SHA
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "commit_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "pr_label=PR-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "pr_label=main" >> $GITHUB_OUTPUT
          fi

      - name: Run init message
        run: |
          echo "Running Identity Service CI/CD for: ${{ steps.context.outputs.pr_label }}, commit: ${{ steps.context.outputs.commit_sha }}"

  tests:
    needs: [context]
    uses: ./.github/workflows/run-backend-tests.yml
    with:
      working-directory: ./identity-service
      test-report-artifact-name: Identity-Service-Test-Reports-${{ needs.context.outputs.pr_label }}

  deploy:
    if: ${{ github.event_name == 'push' }}
    needs: [ context, tests ]
    uses: ./.github/workflows/build-deploy.yml
    with:
      service: locked-out-identity-service
