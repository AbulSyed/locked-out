name: auth-service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'auth-service/**'
  pull_request:
#    branches: [ "main" ]
    paths:
      - 'auth-service/**'

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Run unit tests
      working-directory: ./auth-service
      run: ./gradlew test

  integration_tests:
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run integration tests
        working-directory: ./auth-service
        run: ./gradlew integrationTest

  functional_tests:
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run functional tests
        working-directory: ./auth-service
        run: ./gradlew functionalTest

  contract_tests:
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests, functional_tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run contract tests
        working-directory: ./auth-service
        run: ./gradlew contractTest

  build_and_push_image:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests, functional_tests, contract_tests]
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Build and Push the Docker image
      working-directory: ./auth-service
      run: |
        timestamp=$(TZ="Europe/London" date +'%Y%m%d%H%M')
        tag="v$timestamp"
        docker build . --file Dockerfile --tag abulsy3d/locked-out-auth-service:$tag
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u abulsy3d --password-stdin
        docker push abulsy3d/locked-out-auth-service:$tag
