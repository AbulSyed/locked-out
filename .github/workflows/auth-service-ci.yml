name: auth-service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'auth-service/**'
  pull_request:
#    branches: [ "main" ]
    paths:
      - 'auth-service/**'

jobs:
  run-message:
    runs-on: ubuntu-latest
    outputs: # to make var available for another job
      PR_NUM_OR_MAIN: ${{ steps.set-pr-or-main.outputs.PR_NUM_OR_MAIN }}
    steps:
      - name: Set correct commit SHA
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "COMMIT_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Set PR number or main
        id: set-pr-or-main
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR_NUMBER_OR_MAIN=PR-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "PR_NUM_OR_MAIN=PR-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "PR_NUMBER_OR_MAIN=main" >> $GITHUB_ENV
            echo "PR_NUM_OR_MAIN=main" >> $GITHUB_OUTPUT
          fi

      - name: Run init message
        run: |
          echo "Running Auth Service CI/CD for: $PR_NUMBER_OR_MAIN, commit: $COMMIT_SHA"

  tests:
    needs: [run-message]
    uses: ./.github/workflows/run-backend-tests.yml
    with:
      working-directory: ./auth-service
      test-report-artifact-name: Auth-Service-Test-Reports-${{ needs.run-message.outputs.PR_NUM_OR_MAIN }}

