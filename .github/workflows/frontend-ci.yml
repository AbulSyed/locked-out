name: frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
  pull_request:
#    branches: [ "main" ]
    paths:
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/build-deploy.yml
    with:
      service: frontend
      image_args: "--build-arg VITE_IDENTITY_SERVICE_HOST=http://${{ vars.LOAD_BALANCER_DNS_NAME }}/identity"
      ecs_service: frontend-service
