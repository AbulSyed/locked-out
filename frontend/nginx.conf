server {
    listen 80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router support
    location / {
        try_files $uri /index.html;
    }

    # Health check
    location /health {
        access_log off;
        default_type text/plain;
        return 200 'healthy';
    }
}
